apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      containers:
      - name: bot
        image: telegram-bot:latest
        imagePullPolicy: Never
        env:
        - name: BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: bot-secret
              key: token
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: bot-config
              key: database_url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: bot-config
              key: redis_url
        - name: WEBHOOK_URL
          value: "https://your-ingress/webhook"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-bot-svc
spec:
  selector:
    app: telegram-bot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telegram-bot-ingress
spec:
  rules:
  - host: bot.example.com
    http:
      paths:
      - path: /webhook
        pathType: Prefix
        backend:
          service:
            name: telegram-bot-svc
            port:
              number: 80