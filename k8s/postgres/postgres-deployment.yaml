apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: telegram-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          value: "telegram_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bot-secret
              key: postgres_password
        - name: POSTGRES_DB
          value: "telegram_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc